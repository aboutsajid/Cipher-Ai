name: agent-critical-soak

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  critical-soak:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CIPHER_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      CIPHER_API_KEY: ${{ secrets.CIPHER_API_KEY }}
      CIPHER_BASE_URL: ${{ vars.CIPHER_BASE_URL }}
      CIPHER_MODEL: ${{ vars.CIPHER_MODEL }}
      CIPHER_SKIP_AUTH: ${{ vars.CIPHER_SKIP_AUTH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate model endpoint configuration
        shell: pwsh
        run: |
          $hasOpenRouterKey = -not [string]::IsNullOrWhiteSpace($env:CIPHER_OPENROUTER_API_KEY)
          $hasCustomBaseUrl = -not [string]::IsNullOrWhiteSpace($env:CIPHER_BASE_URL)
          $hasCustomApiKey = -not [string]::IsNullOrWhiteSpace($env:CIPHER_API_KEY)
          $skipAuth = @('1', 'true', 'yes') -contains (($env:CIPHER_SKIP_AUTH ?? '').Trim().ToLowerInvariant())

          if ($hasOpenRouterKey) {
            Write-Host 'Using OpenRouter-backed critical soak lane.'
            exit 0
          }

          if (-not $hasCustomBaseUrl) {
            throw 'Set OPENROUTER_API_KEY or configure CIPHER_BASE_URL for the critical soak lane.'
          }

          if (-not $skipAuth -and -not $hasCustomApiKey) {
            throw 'CIPHER_API_KEY is required when CIPHER_BASE_URL is set unless CIPHER_SKIP_AUTH=true.'
          }

      - name: Install dependencies
        run: npm ci

      - name: Generate critical prompt catalog
        run: npm.cmd run soak:agent:critical:prompts

      - name: Run critical agent soak
        run: npm.cmd run soak:agent:critical:run

      - name: Generate critical soak report
        if: ${{ always() }}
        run: npm.cmd run soak:agent:critical:report

      - name: Upload critical soak prompt catalog
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-critical-prompts
          path: tmp/agent-critical-prompts.md
          if-no-files-found: error

      - name: Upload critical soak markdown report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-critical-report-markdown
          path: tmp/agent-critical-report.md
          if-no-files-found: error

      - name: Upload critical soak json report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-critical-report-json
          path: tmp/agent-critical-report.json
          if-no-files-found: error

      - name: Upload critical soak history
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: agent-critical-history
          path: tmp/agent-critical-history.json
          if-no-files-found: error
