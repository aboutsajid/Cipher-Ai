<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Cipher Workspace icon">
  <defs>
    <linearGradient id="tile" x1="24" y1="18" x2="232" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#17315a" />
      <stop offset="52%" stop-color="#0b1631" />
      <stop offset="100%" stop-color="#070b1c" />
    </linearGradient>
    <radialGradient id="glow" cx="108" cy="82" r="148" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2b5db5" stop-opacity="0.42" />
      <stop offset="65%" stop-color="#102247" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#091022" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ring" x1="54" y1="58" x2="196" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8cf8e1" />
      <stop offset="46%" stop-color="#39d8ff" />
